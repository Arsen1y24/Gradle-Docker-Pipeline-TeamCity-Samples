parameters:
  env.GRADLE_HOME: '/opt/gradle-8.7'
  env.JAVA_HOME: '%env.JDK_21_0_x64%'

jobs:
  Job1:
    name: Job 1
    steps:
      - type: gradle
        name: Build app
        tasks: clean build
        enable-stacktrace: true
        use-gradle-wrapper: false
    dependencies:
      - Job2
      - Job3
      - Job3_2
    enable-dependency-cache: true
    parallelism: 2
      
  Job2:
    name: Test suite A
    steps:
      - type: gradle
        name: Run test suite A
        tasks: test
        working-directory: test1
        use-gradle-wrapper: 'false'
        disabled: true
      - type: script
        name: Debug Gradle env
        working-directory: test1
        script-content: |-
          echo "===== ENV FROM TEAMCITY ====="
          env | sort
          echo "===== RUNNING GRADLE FROM TEAMCITY ====="
          bash ./gradlew --version --info --stacktrace
    enable-dependency-cache: true
    parallelism: 3
    dependencies:
      - Job2_2
  Job3:
    name: Test suite B
    steps:
      - type: script
        script-content: |-
          echo "===== ENV FROM TEAMCITY =====+"
          env | sort
          echo "===== RUNNING GRADLE FROM TEAMCITY ====="
          "$GRADLE_HOME/bin/gradle" --version --info --stacktrace
        name: Debug Gradle env - B
        working-directory: test2
      - type: script
        script-content: >
          "$GRADLE_HOME/bin/gradle" test --info --stacktrace && echo "test \n\n successful"
        name: test 2.0
        disabled: true
      - type: gradle
        name: Run test suite B
        tasks: :test2:test
        use-gradle-wrapper: 'false'
        enable-stacktrace: true
    parallelism: 4
    enable-dependency-cache: true
    dependencies:
      - Job2_2
  Job2_2:
    name: Job 2
    steps:
      - type: script
        script-content: echo "Start"
        name: Job 0
    allow-reuse: false
  Job3_2:
    name: Job 3
    steps:
      - type: script
        script-content: echo "молодец"
        name: Test suite C
